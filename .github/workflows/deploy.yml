name: Test and Deploy to Vercel

# Vercel project identifiers — set these as GitHub repository secrets:
#
#   VERCEL_TOKEN:      Your Vercel personal access token (vercel.com/account/tokens)
#   VERCEL_ORG_ID:     Your team or personal account ID — run `vercel link` locally
#                      then copy "orgId" from .vercel/project.json
#   VERCEL_PROJECT_ID: The Vercel project ID — run `vercel link` locally then copy
#                      "projectId" from .vercel/project.json
#                      (Both IDs are also visible in Vercel → Project → Settings → General)

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Service Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/package-lock.json

      - name: Install service dependencies
        run: npm ci
        working-directory: services

      - name: Run tests
        run: npm test
        working-directory: services

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./app
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
